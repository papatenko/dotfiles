# ============================================================================
# tmux — colorful status bar + quality of life
# Primary use case: this machine is an SSH target (client is kitty).
# ============================================================================

# --- Colors / terminal ------------------------------------------------------
set -g default-terminal "tmux-256color"
# Advertise truecolor for terminals that actually support it. (The old
# `*256col*:Tc` override never matched the real client TERM, xterm-kitty.)
set -as terminal-features ",xterm-kitty:RGB:clipboard"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",alacritty:RGB"

# --- Quality of life --------------------------------------------------------
set -g mouse on                # click panes/windows, scroll, drag to resize
set -g history-limit 50000     # bigger scrollback
set -g base-index 1            # windows start at 1
setw -g pane-base-index 1      # panes start at 1
set -g renumber-windows on     # keep window numbers gapless
set -sg escape-time 10         # snappier ESC (better for vim)
set -g focus-events on
set -s set-clipboard on        # send copied text to the SSH client's clipboard
setw -g mode-keys vi           # vim keys in copy and choice modes

# Show host + session in the terminal title (useful in kitty tabs over SSH)
set -g set-titles on
set -g set-titles-string "#H · #S · #W"

# Reload config with: prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Create windows and split panes in the current path
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane movement and repeatable resizing
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vim-style selection and yank in copy mode (prefix + [)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ============================================================================
# Colors — high contrast, transparent background
#
# The status bar uses bg=default so it inherits the terminal's (kitty's)
# background instead of painting a muted gray over it. Painting a solid
# mid-gray was what made everything look washed out.
# ============================================================================

# Palette (truecolor)
%hidden TEXT="#cdd6f4"
%hidden MUTED="#9399b2"
%hidden BORDER="#45475a"
%hidden BASE="#1e1e2e"
%hidden BLUE="#89b4fa"
%hidden MAUVE="#cba6f7"
%hidden YELLOW="#f9e2af"
%hidden RED="#f38ba8"

# Pane borders: subtle inactive, bright active
set -g pane-border-style "fg=$BORDER"
set -g pane-active-border-style "fg=$BLUE"

# Message / command line
set -g message-style "bg=$YELLOW,fg=$BASE,bold"

# Status bar — transparent, bright text
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=default,fg=$TEXT"

# Left: session name on a solid blue chip
set -g status-left-length 30
set -g status-left "#[bg=$BLUE,fg=$BASE,bold] #S #[bg=default,fg=default] "

# Windows: inactive is readable (not dim), active is a solid mauve chip
set -g status-right-length 90
setw -g window-status-format "#[fg=$MUTED,bg=default] #I:#W "
setw -g window-status-current-format "#[bg=$MAUVE,fg=$BASE,bold] #I:#W "
setw -g window-status-separator ""

# Right: system vitals (CPU/mem) + host + time
set -g status-right "#[fg=$YELLOW]#(~/.tmux/vitals.sh) #[fg=$BORDER]│ #[fg=$MAUVE,bold]#H #[fg=$BORDER]│ #[fg=$BLUE]%a %d %b #[fg=$TEXT,bold]%H:%M "

# Activity highlighting
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=$RED,bold"

# --- Plugins ---------------------------------------------------------------
# prefix + I installs, prefix + U updates
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'omerxx/tmux-sessionx'

# Fuzzy session/window switcher: prefix + o
set -g @sessionx-bind 'o'
set -g @sessionx-fzf-builtin-tmux 'on'

# TPM must be initialized last.
run '~/.tmux/plugins/tpm/tpm'

