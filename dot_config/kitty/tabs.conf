tab_bar_min_tabs 2
# tab_title_template "{fmt.fg.black}{fmt.bg.default}{fmt.fg.white}{fmt.bg.black} ({index}) {title} {fmt.fg.black}{fmt.bg.default} "
# active_tab_title_template "{fmt.fg.blue}{fmt.bg.default}{fmt.fg.black}{fmt.bg.blue} ({index}) {title} {fmt.fg.blue}{fmt.bg.default} "
tab_title_template [{index}] {title}
active_tab_title_template [{index}] {title}

active_tab_font_style bold

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Both, deliberately. kitty_mod+t (ctrl+shift+t) is kitty's default new-tab key;
# without this line it falls through to the built-in `new_tab`, which opens in $HOME
# instead of the current directory.
# Caveat: kitty grabs ctrl+t before zsh sees it, so fzf's ^T file widget is dead.
# Delete the ctrl+t line below to get it back.
map ctrl+t new_tab_with_cwd
map kitty_mod+t new_tab_with_cwd

# New splits should inherit the cwd too (kitty_mod+enter defaults to $HOME).
map kitty_mod+enter new_window_with_cwd

# NOT ctrl+w — that is zsh's backward-kill-word and kitty would eat it first.
map ctrl+shift+w close_tab

map ctrl+shift+page_up move_tab_backward
map ctrl+shift+page_down move_tab_forward
